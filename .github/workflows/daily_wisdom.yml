name: Daily Gita Advice
on:
  schedule:
    - cron: '30 2 * * *' # Runs at 02:30 UTC (8:00 AM IST)
  workflow_dispatch: # Allows manual triggers

jobs:
  send-email:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4 # Updated to v4

      - name: Set up Python
        uses: actions/setup-python@v5 # Updated to v5
        with:
          python-version: '3.9'
          cache: 'pip' # Optional: Speeds up future runs if you have requirements

      - name: Run script
        env:
          SENDER_EMAIL: ${{ secrets.SENDER_EMAIL }}
          APP_PASSWORD: ${{ secrets.APP_PASSWORD }}
          RECEIVER_EMAIL: ${{ secrets.RECEIVER_EMAIL }}
        run: python app.py
